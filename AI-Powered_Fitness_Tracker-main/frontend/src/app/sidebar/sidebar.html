<!-- Mobile Toggle Button -->
<button (click)="toggle()" class="md:hidden fixed top-4 left-4 z-50 p-2 bg-zinc-900 text-white rounded-xl shadow-lg border border-zinc-800">
  <mat-icon>{{isOpen() ? 'close' : 'menu'}}</mat-icon>
</button>

<!-- Backdrop -->
@if (isOpen()) {
  <div (click)="close()" (keydown.escape)="close()" role="button" tabindex="0" class="md:hidden fixed inset-0 bg-black/50 z-40 backdrop-blur-sm transition-opacity"></div>
}

<aside [class.translate-x-0]="isOpen()" class="fixed md:static inset-y-0 left-0 w-64 bg-zinc-900 text-white h-screen flex flex-col border-r border-zinc-800 z-50 transition-transform duration-300 -translate-x-full md:translate-x-0">
  <div class="p-6 flex items-center gap-3">
    <div class="w-10 h-10 bg-emerald-500 rounded-xl flex items-center justify-center shadow-md shadow-emerald-900/20">
      <mat-icon class="text-white">fitness_center</mat-icon>
    </div>
    <h1 class="text-2xl font-bold tracking-tight text-white">BFit</h1>
  </div>

  <nav class="flex-1 px-4 py-4 space-y-1 overflow-y-auto">
    <a routerLink="/dashboard" (click)="close()" routerLinkActive="bg-zinc-800 text-emerald-400" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all hover:bg-zinc-800 group">
      <mat-icon class="text-zinc-400 group-hover:text-emerald-400">dashboard</mat-icon>
      <span class="font-semibold text-sm">Dashboard</span>
    </a>
    <a routerLink="/aicoach" (click)="close()" routerLinkActive="bg-zinc-800 text-emerald-400" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all hover:bg-zinc-800 group">
      <mat-icon class="text-zinc-400 group-hover:text-emerald-400">psychology</mat-icon>
      <span class="font-semibold text-sm">AI Coach</span>
    </a>
    <a routerLink="/workout-planner" (click)="close()" routerLinkActive="bg-zinc-800 text-emerald-400" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all hover:bg-zinc-800 group">
      <mat-icon class="text-zinc-400 group-hover:text-emerald-400">event_note</mat-icon>
      <span class="font-semibold text-sm">Workout Planner</span>
    </a>
    <a routerLink="/nutrition-tracker" (click)="close()" routerLinkActive="bg-zinc-800 text-emerald-400" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all hover:bg-zinc-800 group">
      <mat-icon class="text-zinc-400 group-hover:text-emerald-400">restaurant</mat-icon>
      <span class="font-semibold text-sm">Nutrition Tracker</span>
    </a>
    <a routerLink="/posture-checker" (click)="close()" routerLinkActive="bg-zinc-800 text-emerald-400" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all hover:bg-zinc-800 group">
      <mat-icon class="text-zinc-400 group-hover:text-emerald-400">accessibility_new</mat-icon>
      <span class="font-semibold text-sm">Posture Checker</span>
    </a>
  </nav>

  <div class="p-4 border-t border-zinc-800 space-y-1">
    <a routerLink="/user-profile" (click)="close()" routerLinkActive="bg-zinc-800 text-emerald-400" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all hover:bg-zinc-800 group">
      <mat-icon class="text-zinc-400 group-hover:text-emerald-400">person</mat-icon>
      <span class="font-semibold text-sm">User Profile</span>
    </a>
    <button (click)="logout()" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all hover:bg-zinc-800 group text-zinc-400 hover:text-red-400">
      <mat-icon class="group-hover:text-red-400">logout</mat-icon>
      <span class="font-semibold text-sm">Logout</span>
    </button>
  </div>
</aside>
